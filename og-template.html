<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    color: #e2e8f0;
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Glow orb behind content */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,220,130,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 80px;
  }

  .logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }

  .logo .dot {
    color: #00dc82;
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 24px;
    color: #94a3b8;
    line-height: 1.5;
    max-width: 700px;
    margin: 0 auto 40px;
  }

  .sample-numbers {
    display: flex;
    gap: 48px;
    justify-content: center;
    align-items: center;
  }

  .sample-item {
    text-align: center;
  }

  .sample-label {
    font-size: 13px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .sample-value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 32px;
    color: #00dc82;
  }

  .sample-value.neutral {
    color: #fff;
  }

  .divider {
    width: 1px;
    height: 48px;
    background: rgba(255,255,255,0.1);
  }

  .url {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 16px;
    color: #475569;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="content">
    <div class="logo">What if you invested<span class="dot">...</span></div>
    <div class="tagline">See what any stock investment would be worth today. Historical returns with interactive charts.</div>

    <div class="sample-numbers">
      <div class="sample-item">
        <div class="sample-label">$1,000 in Apple (2010)</div>
        <div class="sample-value">$45,358</div>
      </div>
      <div class="divider"></div>
      <div class="sample-item">
        <div class="sample-label">$1,000 in Nvidia (2015)</div>
        <div class="sample-value">$203,841</div>
      </div>
    </div>
  </div>

  <div class="url">whatifyouinvested.com</div>
</body>
</html>
